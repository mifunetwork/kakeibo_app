services:
  - type: web
    name: kakeibo-app
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kakeibo-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: kakeibo-db
    databaseName: kakeibo_app
    user: kakeibo_app